<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pflanzenbestimmung – Weiße Blüten</title>

  <style>

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(to bottom right,#fafafa,#eceff1);
      color:#333;
    }

    header{
      background:linear-gradient(135deg,#90a4ae,#cfd8dc);
      color:#263238;
      padding:25px;
      text-align:center;
      box-shadow:0 4px 10px rgba(0,0,0,0.2);
    }

    header h1{
      margin:0;
      font-size:2.2rem;
    }

    .container{
      display:grid;
      grid-template-columns:2fr 1fr;
      gap:20px;
      padding:20px;
    }

    .main,.sidebar{
      background:white;
      border-radius:16px;
      padding:20px;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    h2{
      color:#546e7a;
    }

    .option-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
      gap:20px;
      margin-top:20px;
    }

    .card{
      border:2px solid #cfd8dc;
      border-radius:14px;
      overflow:hidden;
      background:#ffffff;
      cursor:pointer;
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-5px);
      box-shadow:0 8px 16px rgba(0,0,0,0.15);
      border-color:#90a4ae;
    }

    .card img{
      width:100%;
      height:auto;
      display:block;
    }

    .card-content{
      padding:15px;
    }

    .card-content h3{
      margin-top:0;
      color:#455a64;
    }

    button{
      background:#90a4ae;
      color:white;
      border:none;
      padding:12px 20px;
      border-radius:10px;
      cursor:pointer;
      margin-top:20px;
      font-size:1rem;
    }

    button:hover{
      background:#607d8b;
    }

    .path-box{
      background:#eceff1;
      border-left:5px solid #90a4ae;
      padding:15px;
      border-radius:10px;
    }

    .path-step{
      background:white;
      border:1px solid #cfd8dc;
      border-radius:8px;
      padding:10px;
      margin-bottom:10px;
    }

    .plant-card{
      border:2px solid #90a4ae;
      border-radius:16px;
      overflow:hidden;
      background:#fafafa;
    }

    .plant-card img{
      width:100%;
      height:auto;
    }

    .plant-info{
      padding:20px;
    }

    .info-box{
      background:white;
      border:1px solid #cfd8dc;
      border-radius:10px;
      padding:12px;
      margin-top:10px;
    }

    @media(max-width:900px){
      .container{
        grid-template-columns:1fr;
      }
    }

  </style>
</head>

<body>

function updatePath(text){

path.push(text);

document.getElementById('pathBox').innerHTML =
path.map(step => `<div class="path-step">${step}</div>`).join('');
}

function resetPath(){

path.length = 0;
updatePath('Start der Bestimmung');
}

function showStart(){

resetPath();

document.getElementById('content').innerHTML = `

<h2>1. Welche Blütenform hat die Pflanze?</h2>

<div class="option-grid">

<div class="card" onclick="showEinzelbluete()">
<img src="images/einzelbluete.jpg">

<div class="card-content">
<h3>Einzelblüte</h3>
</div>
</div>

<div class="card" onclick="showLippenbluete()">
<img src="images/lippenbluete.jpg">

<div class="card-content">
<h3>Lippenblüte</h3>
</div>
</div>

<div class="card" onclick="showZusammengesetzt()">
<img src="images/zusammengesetzte_bluete.jpg">

<div class="card-content">
<h3>Zusammengesetzte Blüte</h3>
</div>
</div>

</div>
`;
}

function showEinzelbluete(){

<h2>2. Anzahl/Form der Kronblätter</h2>

<div class="option-grid">

<div class="card"
onclick="showPlants('Vier symmetrische Kronblätter',
['Knoblauchsrauke','Waldmeister','Hirtentäschel','Wiesen-Labkraut'])">

<h3>Vier symmetrische Kronblätter</h3>
</div>
</div>

onclick="showPlants('Vier unsymmetrische Kronblätter',
['Ackerwicke'])">

</div>

onclick="showPlants('Ähren / Scheinähren',
['Schlangenknöterich','Mittlerer Wegerich','Weiße Teufelskralle'])">

<h3>Ähren / Scheinähren</h3>
</div>
</div>

</div>

`;

function showPlants(category,plantList){

updatePath(category);

let html = `
<h2>Passende Pflanzenarten</h2>
<div class="option-grid">
`;

plantList.forEach(plant => {

html += `

<div class="card"
onclick="showPlantCard('${plant}')">

<img src="${plants[plant].bild}">

<div class="card-content">
<h3>${plant}</h3>
<p>Klicke für die Pflanzenkarte.</p>
</div>

</div>

`;
});

html += `
</div>

<button onclick="showStart()">
🔄 Neue Bestimmung
</button>
`;

document.getElementById('content').innerHTML = html;
}

function showPlantCard(plant){

updatePath('Pflanze bestimmt: ' + plant);

const p = plants[plant];

document.getElementById('content').innerHTML = `

<div class="plant-card">

<img src="${p.bild}">

<div class="plant-info">

<h2>${plant}</h2>

<div class="info-box">
<strong>Familie:</strong><br>
${p.familie}
</div>

<div class="info-box">
<strong>Typischer Fundort:</strong><br>
${p.fundort}
</div>

<div class="info-box">
<strong>Blütezeit:</strong><br>
${p.bluetezeit}
</div>

<button onclick="showStart()">
🔄 Neue Pflanze bestimmen
</button>

</div>

</div>

`;
}

showStart();

</script>
